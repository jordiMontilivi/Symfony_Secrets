# /etc/apache2/sites-available/symfony.conf

<VirtualHost *:80>
    # Correu de l'administrador del servidor
    ServerAdmin webmaster@localhost
    
    # Nom del domini (opcional si només es fa servir IP)
    # ServerName el-teu-domini.com
    # ServerAlias www.el-teu-domini.com

    # DocumentRoot: La carpeta on es troba el "front controller" de Symfony (public/index.php)
    # Assegura't de canviar /var/www/symfony pel camí real del teu projecte
    DocumentRoot /var/www/symfony/public

    <Directory /var/www/symfony/public>
        # Permetre l'ús de .htaccess (necessari per a les rutes de Symfony si no es fa servir fallback)
        AllowOverride All
        
        # Permetre l'accés a tothom
        Require all granted

        # Redirecció de totes les peticions al front controller si el fitxer no existeix
        # Això permet que les rutes de Symfony funcionin (ex: /login, /admin)
        FallbackResource /index.php
    </Directory>

    # Logs d'error i accés (molt útils per depurar errors 500)
    ErrorLog ${APACHE_LOG_DIR}/symfony_error.log
    CustomLog ${APACHE_LOG_DIR}/symfony_access.log combined

    # Opcional: Configuració per millorar el rendiment
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault "access plus 1 month"
        ExpiresByType text/html "access plus 0 seconds"
        ExpiresByType application/json "access plus 0 seconds"
    </IfModule>
</VirtualHost>
